<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Voice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    color-scheme: dark;
    --bg: #15181f;
    --panel: #1d2230;
    --panel-2: #10141d;
    --text: #edf1f7;
    --muted: #9aa7bc;
    --accent: #ff735c;
    --accent-2: #6de2ff;
    --warn: #f8ba52;
  }
  body {
    background:
      radial-gradient(circle at top, rgba(255,115,92,0.16), transparent 32%),
      radial-gradient(circle at right, rgba(109,226,255,0.14), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    gap: 12px;
    padding: 18px;
  }
  #topbar, #draft-label, #draft, #level {
    width: min(1100px, 96vw);
    margin: 0 auto;
  }
  #topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
  }
  #heading {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  h1 {
    font-size: clamp(1.9rem, 4vw, 2.8rem);
    line-height: 1.05;
    letter-spacing: -0.04em;
  }
  #status {
    min-height: 1.4em;
    color: var(--muted);
    font-size: 1.02rem;
  }
  #mode-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 14px;
    font-size: 0.95rem;
    color: #c8d0df;
  }
  #mode-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  #mode-toggle input {
    width: 18px;
    height: 18px;
    accent-color: var(--accent-2);
  }
  #mode-hint {
    color: var(--muted);
  }
  #orb {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    border: none;
    color: var(--text);
    font: 700 0.98rem/1 "IBM Plex Sans", system-ui, sans-serif;
    letter-spacing: 0.12em;
    background: radial-gradient(circle, var(--accent) 0%, #2b1621 64%, #12141a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.25s ease;
    flex: 0 0 auto;
  }
  #orb:hover { transform: scale(1.04); }
  #orb:active { transform: scale(0.98); }
  #orb.listening {
    animation: pulse 1.4s ease-in-out infinite;
  }
  #orb.thinking {
    background: radial-gradient(circle, var(--warn) 0%, #2a2316 64%, #12141a 100%);
    animation: think 1.8s ease-in-out infinite;
  }
  #orb.speaking {
    background: radial-gradient(circle, var(--accent-2) 0%, #152630 64%, #12141a 100%);
    animation: speak 0.8s ease-in-out infinite alternate;
  }
  #level {
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
  }
  #level-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 50ms;
  }
  #draft-label {
    font-size: 0.94rem;
    color: var(--muted);
  }
  #draft {
    min-height: 25dvh;
    max-height: 52dvh;
    overflow-y: auto;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), var(--panel);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px;
    padding: 18px 20px 26px;
    font-size: clamp(1.15rem, 2.5vw, 1.7rem);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  #draft.empty {
    color: #6e7a92;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,115,92,0.30); }
    50% { box-shadow: 0 0 32px 10px rgba(255,115,92,0.16); }
  }
  @keyframes think {
    0%, 100% { box-shadow: 0 0 18px 6px rgba(248,186,82,0.18); }
    50% { box-shadow: 0 0 30px 14px rgba(248,186,82,0.10); }
  }
  @keyframes speak {
    from { box-shadow: 0 0 12px 6px rgba(109,226,255,0.16); }
    to { box-shadow: 0 0 28px 14px rgba(109,226,255,0.28); }
  }
  @media (max-width: 720px) {
    body { padding: 14px 12px; }
    #topbar { gap: 12px; }
    #orb {
      width: 140px;
      height: 140px;
      font-size: 0.9rem;
    }
    #draft {
      padding: 16px 14px 22px;
      font-size: clamp(1.05rem, 5vw, 1.35rem);
    }
  }
</style>
</head>
<body>
  <div id="topbar">
    <div id="heading">
      <h1>OpenClaw Voice</h1>
      <p id="status">Connecting...</p>
      <div id="mode-row">
        <label id="mode-toggle">
          <input id="require-send-phrase" type="checkbox" checked />
          <span>Require "fertig" to send</span>
        </label>
        <span id="mode-hint">Free talk sends each pause automatically.</span>
      </div>
    </div>
    <button id="orb" type="button">START</button>
  </div>
  <div id="level"><div id="level-bar"></div></div>
  <div id="draft-label">Current draft</div>
  <div id="draft" class="empty"></div>

<script>
const WS_URL = (() => {
  if (location.protocol === 'https:') return `wss://${location.host.replace(/:\d+$/, '')}:8766`;
  return `ws://${location.hostname}:8766`;
})();
const SILENCE_THRESHOLD = 0.015;
const SILENCE_DURATION = 2000;
const MIN_SPEECH_DURATION = 500;
const INTERRUPT_CODE = 'KeyS';
const SETTINGS_KEY = 'openclaw-voice-require-send-phrase';

let ws, audioCtx, stream, processor, analyser;
let active = false, busy = false;
let audioChunks = [];
let silenceStart = null, speechStart = null, hasSpeech = false;
let currentAudio = null;
let voiceState = 'idle';
let dropIncomingAudio = false;
let lastOrbActivationAt = 0;
let requireSendPhrase = loadRequireSendPhraseSetting();

function loadRequireSendPhraseSetting() {
  try {
    const stored = localStorage.getItem(SETTINGS_KEY);
    if (stored === null) return true;
    return stored !== '0';
  } catch {
    return true;
  }
}

function draftHintText() {
  return requireSendPhrase
    ? 'Pause whenever you want. End with "fertig". Say "stop" to clear.'
    : 'Free talk is on. Each pause sends automatically. Say "stop" to clear.';
}

function idleStatusText() {
  return requireSendPhrase ? 'Idle... build your draft' : 'Idle... speak when you want';
}

function listeningStatusText() {
  return requireSendPhrase
    ? 'Listening... say "fertig" when you want to send'
    : 'Listening... speak freely';
}

function syncModeUi() {
  const checkbox = document.getElementById('require-send-phrase');
  const hint = document.getElementById('mode-hint');
  if (checkbox) checkbox.checked = requireSendPhrase;
  if (hint) {
    hint.textContent = requireSendPhrase
      ? 'Draft mode keeps listening until you end with "fertig".'
      : 'Free talk sends each pause automatically.';
  }
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function setDraftText(text) {
  const draft = document.getElementById('draft');
  if (!text) {
    draft.textContent = draftHintText();
    draft.classList.add('empty');
    return;
  }
  draft.textContent = text;
  draft.classList.remove('empty');
}

function setOrb(state) {
  voiceState = state;
  const orb = document.getElementById('orb');
  orb.classList.remove('listening', 'thinking', 'speaking');
  orb.textContent = active ? 'STOP' : 'START';
  if (state === 'listening') orb.classList.add('listening');
  if (state === 'thinking') orb.classList.add('thinking');
  if (state === 'speaking') orb.classList.add('speaking');
}

function sendSettings() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'settings', require_send_phrase: requireSendPhrase }));
  }
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    sendSettings();
    setStatus('Click orb to start');
  };
  ws.onclose = () => {
    setStatus('Disconnected...');
    setTimeout(connect, 2000);
  };
  ws.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) {
      if (!dropIncomingAudio) playAudio(event.data);
      return;
    }
    const data = JSON.parse(event.data);
    if (data.type === 'control') {
      if (data.command === 'toggle_listen') handleRemoteToggleListen();
      return;
    }
    switch (data.status) {
      case 'transcribing':
        busy = true;
        setStatus('Transcribing...');
        setOrb('thinking');
        break;
      case 'heard':
        setDraftText(data.text);
        break;
      case 'held':
        busy = false;
        setDraftText(data.text);
        setStatus(requireSendPhrase ? 'Draft saved. Keep talking or say "fertig".' : 'Draft saved.');
        setOrb(active ? 'listening' : 'idle');
        break;
      case 'thinking':
        busy = true;
        setStatus('Thinking...');
        setOrb('thinking');
        break;
      case 'speaking':
        busy = true;
        setDraftText(data.text || '');
        setStatus('Speaking...');
        setOrb('speaking');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'voice_state', state: 'speaking' }));
        }
        break;
      case 'idle':
        busy = false;
        setStatus(active ? listeningStatusText() : idleStatusText());
        setOrb(active ? 'listening' : 'idle');
        if (!active) setDraftText('');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'voice_state', state: 'idle' }));
        }
        break;
      case 'interrupted':
        busy = false;
        stopCurrentAudio();
        setStatus(active ? listeningStatusText() : idleStatusText());
        setOrb(active ? 'listening' : 'idle');
        break;
      case 'config':
        break;
    }
  };
}

async function ensureAudio() {
  if (audioCtx) return;
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioCtx = new AudioContext({ sampleRate: 16000 });
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  source.connect(analyser);
  analyser.connect(processor);
  processor.connect(audioCtx.destination);
  processor.onaudioprocess = onAudioProcess;
}

function onAudioProcess(event) {
  if (!active || busy || !ws || ws.readyState !== WebSocket.OPEN) return;
  const input = event.inputBuffer.getChannelData(0);
  const pcm = new Int16Array(input.length);
  let level = 0;
  for (let i = 0; i < input.length; i += 1) {
    const sample = Math.max(-1, Math.min(1, input[i]));
    pcm[i] = sample * 32767;
    level = Math.max(level, Math.abs(sample));
  }
  document.getElementById('level-bar').style.width = `${Math.min(100, level * 280)}%`;
  const now = performance.now();
  if (level > SILENCE_THRESHOLD) {
    if (!speechStart) speechStart = now;
    silenceStart = null;
    hasSpeech = true;
    audioChunks.push(pcm);
    return;
  }
  if (!hasSpeech) return;
  audioChunks.push(pcm);
  if (!silenceStart) silenceStart = now;
  const speechDuration = speechStart ? now - speechStart : 0;
  const silenceDuration = now - silenceStart;
  if (speechDuration >= MIN_SPEECH_DURATION && silenceDuration >= SILENCE_DURATION) {
    sendAudio();
  }
}

function flattenAudio(chunks) {
  const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
  const merged = new Int16Array(total);
  let offset = 0;
  for (const chunk of chunks) {
    merged.set(chunk, offset);
    offset += chunk.length;
  }
  return merged.buffer;
}

function sendAudio() {
  if (!audioChunks.length || !ws || ws.readyState !== WebSocket.OPEN) return;
  busy = true;
  ws.send(flattenAudio(audioChunks));
  audioChunks = [];
  silenceStart = null;
  speechStart = null;
  hasSpeech = false;
  setStatus('Sending audio...');
  setOrb('thinking');
}

function stopCurrentAudio() {
  dropIncomingAudio = true;
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  setTimeout(() => { dropIncomingAudio = false; }, 150);
}

function playAudio(buffer) {
  stopCurrentAudio();
  const blob = new Blob([buffer], { type: 'audio/mpeg' });
  currentAudio = new Audio(URL.createObjectURL(blob));
  currentAudio.onended = () => {
    currentAudio = null;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'voice_state', state: 'idle' }));
    }
    if (active && !busy) {
      setStatus(listeningStatusText());
      setOrb('listening');
    }
  };
  currentAudio.play().catch(() => {});
}

async function toggleVoice() {
  if (!active) {
    await ensureAudio();
    active = true;
    busy = false;
    setStatus(listeningStatusText());
    setDraftText('');
    setOrb('listening');
    lastOrbActivationAt = Date.now();
    return;
  }
  active = false;
  busy = false;
  audioChunks = [];
  silenceStart = null;
  speechStart = null;
  hasSpeech = false;
  stopCurrentAudio();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }
  setDraftText('');
  setStatus('Stopped');
  setOrb('idle');
}

function handleRemoteToggleListen() {
  const elapsed = Date.now() - lastOrbActivationAt;
  if (elapsed < 250) return;
  toggleVoice().catch(() => {});
}

document.getElementById('orb').addEventListener('click', () => {
  toggleVoice().catch((error) => setStatus(`Mic error: ${error.message}`));
});

document.getElementById('require-send-phrase').addEventListener('change', (event) => {
  requireSendPhrase = event.target.checked;
  try {
    localStorage.setItem(SETTINGS_KEY, requireSendPhrase ? '1' : '0');
  } catch {}
  syncModeUi();
  setDraftText('');
  setStatus(active ? listeningStatusText() : idleStatusText());
  sendSettings();
});

window.addEventListener('keydown', (event) => {
  if (event.code !== INTERRUPT_CODE) return;
  event.preventDefault();
  stopCurrentAudio();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }
});

syncModeUi();
setDraftText('');
setOrb('idle');
connect();
</script>
</body>
</html>
